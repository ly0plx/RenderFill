<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RenderFill</title>
  <link rel="icon" type="image/x-icon" href="./favicon.png">
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>
<body>
  <main class="container">
    <form id="ec" aria-label="Render form">
      <h1>RenderFill</h1>
      <p class="subtitle">Build HTML visually, then copy the generated markup.</p>

      <label for="element-select">Element</label>
      <select id="element-select">
        <option value="" disabled selected>Choose an element</option>
        <option value="h1">H1</option>
        <option value="h2">H2</option>
        <option value="h3">H3</option>
        <option value="h4">H4</option>
        <option value="h5">H5</option>
        <option value="h6">H6</option>
        <option value="p">Paragraph (p)</option>
        <option value="button">Button</option>
        <option value="small">Small</option>
        <option value="input">Input</option>
        <option value="div">Div</option>
        <option value="span">Span</option>
        <option value="ul">Unordered List (ul)</option>
        <option value="ol">Ordered List (ol)</option>
        <option value="li">List Item (li)</option>
        <option value="a">Link (a)</option>
        <option value="img">Image (img)</option>
        <option value="table">Table</option>
        <option value="tr">Table Row (tr)</option>
        <option value="td">Table Cell (td)</option>
        <option value="th">Table Header (th)</option>
        <option value="em">Emphasis (em)</option>
        <option value="strong">Strong</option>
        <option value="blockquote">Blockquote</option>
        <option value="code">Code</option>
        <option value="pre">Preformatted Text (pre)</option>
        <option value="hr">Horizontal Rule (hr)</option>
        <option value="br">Line Break (br)</option>
        <option value="label">Label</option>
        <option value="textarea">Textarea</option>
        <option value="select">Select</option>
        <option value="option">Option</option>
      </select>

      <label for="element-content">Content</label>
      <input type="text" id="element-content" placeholder="Inside text or URL">

      <label for="element-attributes">Extra attributes</label>
      <input type="text" id="element-attributes" placeholder='class="card" id="hero"'>
      <small class="hint">Tip: add optional attributes with valid HTML syntax.</small>

      <div class="actions">
        <button type="button" id="render-button">Render</button>
        <button type="button" id="undo-button">Undo</button>
        <button type="button" id="clear-button">Clear</button>
      </div>
    </form>

    <section id="result-container" aria-live="polite">
      <h2>Preview</h2>
      <div id="result"></div>

      <div class="code-header">
        <h2>Generated HTML</h2>
        <div>
          <button type="button" id="copy-button">Copy</button>
          <button type="button" id="download-button">Download</button>
        </div>
      </div>
      <pre id="html-code"></pre>
    </section>
  </main>
</body>
</html>
